services:
  api:
    build:
      context: .
    image: cowork-api:latest
    ports:
      - "${PORT:-8000}:8000"
    environment:
      JWT_SECRET: ${JWT_SECRET:-cowork-dev-secret-change-me}
      DATABASE_URL: sqlite:////app/data/cowork.db
    volumes:
      - cowork-data:/app/data
    restart: unless-stopped

volumes:
  cowork-data:
